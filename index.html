<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MyTube Ultra — Постоянный хостинг</title>
    <style>
        body { font-family: "Roboto", Arial, sans-serif; background: #0f0f0f; color: white; margin: 0; overflow: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; height: 56px; background: #0f0f0f; border-bottom: 1px solid #222; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo { color: #ff0000; font-size: 22px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .upload-btn { background: #3ea6ff; color: #000; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .wrapper { display: flex; margin-top: 56px; }
        nav { width: 240px; padding: 15px; border-right: 1px solid #222; height: calc(100vh - 56px); position: fixed; background: #0f0f0f; }
        main { margin-left: 240px; width: calc(100% - 240px); padding: 24px; overflow-y: auto; height: calc(100vh - 56px); }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { cursor: pointer; transition: 0.2s; border-radius: 12px; overflow: hidden; padding-bottom: 10px; }
        .video-card:hover { background: #222; }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 12px; overflow: hidden; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .v-title { font-size: 16px; margin: 10px 10px 5px; font-weight: bold; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 3000; justify-content: center; align-items: center; }
        .modal-box { background: #212121; padding: 25px; border-radius: 12px; width: 450px; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 10px; background: #121212; border: 1px solid #333; color: white; border-radius: 5px; }
        #playerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; justify-content: center; align-items: center; flex-direction: column;}
        .video-container { position: relative; width: 95%; max-width: 1100px; aspect-ratio: 16/9; background: #000; }
        video, iframe { width: 100%; height: 100%; border: none; }
        .yt-controls { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(0, 0, 0, 0.9)); padding: 15px 25px; display: flex; flex-direction: column; opacity: 0; transition: opacity 0.2s; z-index: 10; }
        .video-container:hover .yt-controls { opacity: 1; }
        .progress-container { width: 100%; height: 4px; background: rgba(255, 255, 255, 0.2); cursor: pointer; margin-bottom: 12px; }
        .progress-red { height: 100%; background: #ff0000; width: 0%; }
        .buttons-row { display: flex; align-items: center; justify-content: space-between; }
        .btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><span>▶</span> MyTube Premium</div>
        <button class="upload-btn" id="openUploadBtn">ДОБАВИТЬ ВРЕМЕННОЕ</button>
    </header>

    <div class="wrapper">
        <nav>
            <div style="background: #272727; padding: 10px; border-radius: 8px; cursor: pointer;">🏠 Главная</div><br>
            <div style="padding: 10px; cursor: pointer">🎞️ Shorts</div><br>
            <div style="padding: 10px; cursor: pointer">📁 Подписки</div>
        </nav>
        <main>
            <h2 style="margin-top:0">Вечные рекомендации</h2>
            <div class="video-grid" id="mainGrid"></div>
        </main>
    </div>

    <div id="uploadModal" class="modal">
        <div class="modal-box">
            <h2>Тестовая загрузка</h2>
            <input type="file" id="fileInput" accept="video/*" />
            <input type="text" id="titleInput" placeholder="Название видео" />
            <button class="upload-btn" id="publishBtn">ОПУБЛИКОВАТЬ (ДО ОБНОВЛЕНИЯ)</button>
            <button onclick="document.getElementById('uploadModal').style.display='none'" style="color:gray; background:none; border:none; cursor:pointer">Отмена</button>
        </div>
    </div>

    <div id="playerModal">
        <button onclick="closePlayer()" style="position:absolute; top:20px; right:20px; color:white; background:none; border:none; font-size:35px; cursor:pointer; z-index:5000">✕</button>
        <div class="video-container" id="vContainer">
            </div>
        <h2 id="playerTitle" style="margin-top:20px; width:95%; max-width:1100px"></h2>
    </div>

    <script>
        // === ВАША БАЗА ДАННЫХ (ЭТИ ВИДЕО ОСТАНУТСЯ НАВСЕГДА) ===
        const fixedVideos = [
                const fixedVideos = [
            {
                title: "GAYAZOV$ BROTHER$ & Filatov & Karas — ПОШЛА ЖАРА",
                thumb: "https://img.youtube.com/vi/TBRIZRD2bYE/maxresdefault.jpg",
                url: "https://www.youtube.com/embed/TBRIZRD2bYE",
                type: "youtube"
            },
            {
                title: "NLO - Танцы",
                thumb: "https://img.youtube.com/vi/gWHfyg_kDDg/maxresdefault.jpg",
                url: "https://www.youtube.com/embed/gWHfyg_kDDg",
                type: "youtube"
            },
            {
                title: "Моё личное видео (Файл)",
                thumb: "https://via.placeholder.com/600x340/222/fff?text=Video+File", 
                url: "ССЫЛКА_НА_ПРЯМОЙ_ФАЙЛ_ВИДЕО.mp4",
                type: "file" 
            }
        ];
                                   

                
    

        let temporaryVideos = [];
        let currentIndex = -1;

        function renderAll() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            
            // Объединяем вечные и временные видео
            const allVideos = [...fixedVideos, ...temporaryVideos];

            allVideos.forEach((data, index) => {
                const card = document.createElement("div");
                card.className = "video-card";
                card.innerHTML = `<div class="thumb-box"><img src="${data.thumb}"></div><div class="v-title">${data.title}</div>`;
                card.onclick = () => openPlayer(index, allVideos);
                grid.appendChild(card);
            });
        }

        function openPlayer(index, list) {
            const data = list[index];
            const container = document.getElementById('vContainer');
            document.getElementById('playerTitle').innerText = data.title;
            
            if (data.type === "youtube") {
                container.innerHTML = `<iframe src="${data.url}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `<video id="vPlayer" src="${data.url}" controls autoplay></video>`;
            }

            document.getElementById('playerModal').style.display = "flex";
        }

        function closePlayer() {
            document.getElementById('vContainer').innerHTML = '';
            document.getElementById('playerModal').style.display = "none";
        }

        // Логика временной кнопки "Добавить"
        document.getElementById("openUploadBtn").onclick = () => document.getElementById("uploadModal").style.display = "flex";
        document.getElementById("publishBtn").onclick = () => {
            const file = document.getElementById("fileInput").files[0];
            const title = document.getElementById("titleInput").value;
            if (file && title) {
                temporaryVideos.push({
                    title: title,
                    thumb: "https://via.placeholder.com/300x169/333/fff?text=New+Video",
                    url: URL.createObjectURL(file),
                    type: "file"
                });
                renderAll();
                document.getElementById("uploadModal").style.display = "none";
            }
        };

        // Запуск
        renderAll();
    </script>
</body>
</html>
