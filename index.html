<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProTube — Твой личный видеохост</title>
    <style>
        body { font-family: "Roboto", Arial, sans-serif; background: #0f0f0f; color: white; margin: 0; overflow: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; height: 56px; background: #0f0f0f; border-bottom: 1px solid #222; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo { color: #ff0000; font-size: 22px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .upload-btn { background: #3ea6ff; color: #000; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .wrapper { display: flex; margin-top: 56px; }
        nav { width: 240px; padding: 15px; border-right: 1px solid #222; height: calc(100vh - 56px); position: fixed; background: #0f0f0f; }
        main { margin-left: 240px; width: calc(100% - 240px); padding: 24px; overflow-y: auto; height: calc(100vh - 56px); }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { cursor: pointer; transition: 0.2s; border-radius: 12px; overflow: hidden; padding-bottom: 10px; }
        .video-card:hover { background: #222; }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #222; border-radius: 12px; overflow: hidden; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .v-title { font-size: 16px; margin: 10px 10px 5px; font-weight: bold; }
        
        /* Плеер */
        #playerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; justify-content: center; align-items: center; flex-direction: column;}
        .video-container { position: relative; width: 95%; max-width: 1100px; aspect-ratio: 16/9; background: #000; }
        iframe, video { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 20px; right: 20px; color: white; background: none; border: none; font-size: 35px; cursor: pointer; z-index: 5000; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><span>▶</span> ProTube Premium</div>
        <button class="upload-btn" onclick="alert('Чтобы добавить видео навсегда, отредактируйте файл index.html на GitHub!')">ДОБАВИТЬ ВЕЧНОЕ</button>
    </header>

    <div class="wrapper">
        <nav>
            <div style="background: #272727; padding: 10px; border-radius: 8px; cursor: pointer;">🏠 Главная</div><br>
            <div style="padding: 10px; cursor: pointer">🎞️ Shorts</div><br>
            <div style="padding: 10px; cursor: pointer">📁 Подписки</div>
        </nav>
        <main>
            <h2 style="margin-top:0">Вечные рекомендации</h2>
            <div class="video-grid" id="mainGrid"></div>
        </main>
    </div>

    <div id="playerModal">
        <button class="close-btn" onclick="closePlayer()">✕</button>
        <div class="video-container" id="vContainer"></div>
        <h2 id="playerTitle" style="margin-top:20px; width:95%; max-width:1100px"></h2>
    </div>

    <script>
        // ТВОЯ БАЗА ВИДЕО
        const fixedVideos = [
            {
                title: "GAYAZOV$ BROTHER$ & Filatov & Karas — ПОШЛА ЖАРА",
                thumb: "https://img.youtube.com/vi/TBRIZRD2bYE/maxresdefault.jpg",
                url: "https://www.youtube.com/embed/TBRIZRD2bYE",
                type: "youtube"
            },
            {
                title: "NLO - Танцы",
                thumb: "https://img.youtube.com/vi/gWHfyg_kDDg/maxresdefault.jpg",
                url: "https://www.youtube.com/embed/gWHfyg_kDDg",
                type: "youtube"
            },
            {
                title: "XOLIDAYBOY - Моя хулиганка",
                thumb: "https://img.youtube.com/vi/ddW4dZ7THRg/maxresdefault.jpg",
                url: "https://www.youtube.com/embed/ddW4dZ7THRg",
                type: "youtube"
            },
            {
                title: "MIA BOYKA & ЕГОР ШИП - ПИКАЧУ",
                thumb: "https://img.youtube.com/vi/JTjTyU_DC4k/maxresdefault.jpg",
                url: "https://www.youtube.com/embed/JTjTyU_DC4k",
                type: "youtube"
            },
            {
                title: "HENSY - Поболело и прошло",
                thumb: "https://img.youtube.com/vi/1rOxpVb1Gb4/maxresdefault.jpg",
                url: "https://www.youtube.com/embed/1rOxpVb1Gb4",
                type: "youtube"
            },
            {
                title: "DABRO - Юность",
                thumb: "https://img.youtube.com/vi/pUov86haT88/maxresdefault.jpg",
                url: "https://www.youtube.com/embed/pUov86haT88",
                type: "youtube"
            },
            {
                title: "GAYAZOV$ BROTHER$ - Малиновая лада",
                thumb: "https://img.youtube.com/vi/wULaGx-sl1Q/maxresdefault.jpg",
                url: "https://www.youtube.com/embed/wULaGx-sl1Q",
                type: "youtube"
            }
        ];

        function renderAll() {
            const grid = document.getElementById('mainGrid');
            if (!grid) return;
            grid.innerHTML = '';
            
            fixedVideos.forEach((data, index) => {
                const card = document.createElement("div");
                card.className = "video-card";
                card.innerHTML = `
                    <div class="thumb-box">
                        <img src="${data.thumb}">
                    </div>
                    <div class="v-title">${data.title}</div>
                `;
                card.onclick = () => openPlayer(index);
                grid.appendChild(card);
            });
        }

        function openPlayer(index) {
            const data = fixedVideos[index];
            const container = document.getElementById('vContainer');
            document.getElementById('playerTitle').innerText = data.title;
            
            if (data.type === "youtube") {
                container.innerHTML = `<iframe src="${data.url}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            } else {
                container.innerHTML = `<video src="${data.url}" controls autoplay></video>`;
            }
            document.getElementById('playerModal').style.display = "flex";
        }

        function closePlayer() {
            document.getElementById('vContainer').innerHTML = '';
            document.getElementById('playerModal').style.display = "none";
        }

        // ЗАПУСК ПРИ ЗАГРУЗКЕ
        window.onload = renderAll;
    </script>
</body>
</html>
