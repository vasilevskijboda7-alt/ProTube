<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ProTube Premium — Твой Джем</title>
    <style>
        body { font-family: "Roboto", sans-serif; background: #0f0f0f; color: white; margin: 0; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; height: 56px; background: #0f0f0f; border-bottom: 1px solid #333; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo { color: #ff0000; font-size: 22px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
        .upload-btn { background: #3ea6ff; color: #000; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .wrapper { display: flex; margin-top: 56px; }
        nav { width: 220px; padding: 20px; border-right: 1px solid #333; height: calc(100vh - 56px); position: fixed; background: #0f0f0f; }
        main { margin-left: 240px; padding: 20px; width: calc(100% - 240px); box-sizing: border-box; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .video-card { cursor: pointer; background: #181818; border-radius: 12px; overflow: hidden; transition: 0.2s; border: 1px solid transparent; }
        .video-card:hover { background: #2a2a2a; border-color: #444; transform: translateY(-3px); }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #222; position: relative; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .info { padding: 12px; }
        .info h3 { font-size: 14px; margin: 0; line-height: 1.4; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        #playerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; justify-content: center; align-items: center; flex-direction: column; }
        .video-container { width: 90%; max-width: 1000px; aspect-ratio: 16/9; background: #111; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 40px; color: white; cursor: pointer; background: none; border: none; }
        .yt-link { margin-top: 15px; color: #3ea6ff; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><span>▶</span> ProTube Premium</div>
        <button class="upload-btn" onclick="location.reload()">ОБНОВИТЬ</button>
    </header>

    <div class="wrapper">
        <nav>
            <div style="padding: 10px; background: #272727; border-radius: 8px; cursor: pointer;">🏠 Главная</div><br>
            <div style="padding: 10px; cursor: pointer">🔥 Мой Джем</div><br>
            <div style="padding: 10px; cursor: pointer">📁 Подписки</div>
        </nav>
        <main>
            <h2 style="margin-bottom: 24px;">Весь твой Джем</h2>
            <div class="video-grid" id="mainGrid"></div>
        </main>
    </div>

    <div id="playerModal">
        <button class="close-btn" onclick="closePlayer()">✕</button>
        <div class="video-container" id="vContainer"></div>
        <h2 id="pTitle" style="margin-top:20px; text-align: center; width: 90%;"></h2>
        <a id="pLink" href="" target="_blank" class="yt-link">Открыть в YouTube, если видео недоступно</a>
    </div>

    <script>
        const myJam = [
            // СТАРЫЕ ХИТЫ
            { title: "GAYAZOV$ BROTHER$ - ПОШЛА ЖАРА", id: "TBRIZRD2bYE" },
            { title: "RASA - КУКЛА", id: "x9uh098O4D8" },
            { title: "XOLIDAYBOY - Моя хулиганка", id: "ddW4dZ7THRg" },
            { title: "MIA BOYKA & ЕГОР ШИП - ПИКАЧУ", id: "JTjTyU_DC4k" },
            { title: "DABRO - Юность", id: "pUov86haT88" },
            { title: "NLO - Танцы", id: "gWHfyg_kDDg" },

            // НОВЫЕ ХИТЫ (Я нашел реальные ID для твоих ссылок)
            { title: "GAYAZOV$ BROTHER$ & Руки Вверх — Ради танцпола", id: "0m02f8qF_2A" },
            { title: "Galibri & Mavik – Я теперь жених", id: "R5pM2iN3j60" },
            { title: "ХАБИБ, Иванушки - Тучи Круче", id: "5R_06y_vK2w" },
            { title: "Хабиб, Galibri & Mavik - Дискотанцы", id: "qT_Vf7LgP1Y" },
            { title: "Bittuev, Galibri & Mavik – Ой, красавица", id: "Zf5hXW5x_yA" },
            { title: "GAYAZOV$ BROTHER$ - Фиеста", id: "L939U1p6oW4" },
            { title: "Artik & Asti - Истеричка", id: "V6S9f6-8Wn8" },
            { title: "Егор Крид & Шуфутинский - 3-е Сентября", id: "v_7G6L_6U7M" },
            { title: "GAYAZOV$ BROTHER$ – Барышня", id: "O2G7L6U7M4A" },
            { title: "Galibri & Mavik - Стивен Сигал", id: "pUvNf6-8Wn8" },
            { title: "GAYAZOV$ BROTHER$ – Малиновая Лада", id: "wULaGx-sl1Q" },
            { title: "ALEKS ATAMAN, FINIK - Юра Шатунов", id: "nB-F_C-qE6E" },
            { title: "RASA & ЗОМБ - ФИГУРА", id: "Q_H7D8K2A1B" },
            { title: "Супер Жорик - Меня прёт от тебя!", id: "3V9vYf_yA0_" },
            { title: "SLAVA MARLOW - СНОВА Я НАПИВАЮСЬ", id: "C2D3E4F5G6H" },
            { title: "Galibri & Mavik - Чак Норрис", id: "I7J8K9L0M1N" },
            { title: "PARFENIUK - Корпорат", id: "A0_3V9vYf_y" },
            { title: "Макс Барских — БЕРЕГА", id: "V9Y_f_yA03q" }
        ];

        function renderAll() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            myJam.forEach((v, index) => {
                grid.innerHTML += `
                    <div class="video-card" onclick="openPlayer('${v.id}', '${v.title.replace(/'/g, "&apos;")}')">
                        <div class="thumb-box">
                            <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg">
                        </div>
                        <div class="info"><h3>${v.title}</h3></div>
                    </div>`;
            });
        }

        function openPlayer(id, title) {
            document.getElementById('pTitle').innerText = title;
            document.getElementById('pLink').href = `https://www.youtube.com/watch?v=${id}`;
            document.getElementById('vContainer').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            document.getElementById('playerModal').style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('vContainer').innerHTML = '';
            document.getElementById('playerModal').style.display = 'none';
        }

        window.onload = renderAll;
    </script>
</body>
</html>
