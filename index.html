<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ProTube Premium — Полный Джем</title>
    <style>
        body { font-family: "Roboto", Arial, sans-serif; background: #0f0f0f; color: white; margin: 0; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; height: 56px; background: #0f0f0f; border-bottom: 1px solid #222; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .logo { color: #ff0000; font-size: 22px; font-weight: bold; display: flex; align-items: center; gap: 5px; }
        .upload-btn { background: #3ea6ff; color: #000; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .wrapper { display: flex; margin-top: 56px; }
        nav { width: 240px; padding: 15px; border-right: 1px solid #222; height: calc(100vh - 56px); position: fixed; background: #0f0f0f; }
        main { margin-left: 240px; width: calc(100% - 240px); padding: 24px; overflow-y: auto; height: calc(100vh - 56px); box-sizing: border-box; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        .video-card { cursor: pointer; transition: 0.2s; border-radius: 12px; overflow: hidden; background: #181818; padding-bottom: 10px; }
        .video-card:hover { background: #222; transform: scale(1.02); }
        .thumb-box { width: 100%; aspect-ratio: 16/9; background: #222; overflow: hidden; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .v-title { font-size: 14px; margin: 10px; font-weight: bold; line-height: 1.4; height: 40px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        #playerModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 4000; justify-content: center; align-items: center; flex-direction: column; }
        .video-container { position: relative; width: 90%; max-width: 1100px; aspect-ratio: 16/9; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 20px; right: 20px; color: white; background: none; border: none; font-size: 40px; cursor: pointer; z-index: 5000; }
    </style>
</head>
<body>
    <header>
        <div class="logo"><span>▶</span> ProTube Premium</div>
        <button class="upload-btn" onclick="location.reload()">ОБНОВИТЬ</button>
    </header>

    <div class="wrapper">
        <nav>
            <div style="background: #272727; padding: 10px; border-radius: 8px; cursor: pointer;">🏠 Главная</div><br>
            <div style="padding: 10px; cursor: pointer">🔥 Мой Джем</div><br>
            <div style="padding: 10px; cursor: pointer">📁 Подписки</div>
        </nav>
        <main>
            <h2 style="margin-top:0">Весь твой Джем (Все песни)</h2>
            <div class="video-grid" id="mainGrid"></div>
        </main>
    </div>

    <div id="playerModal">
        <button class="close-btn" onclick="closePlayer()">✕</button>
        <div class="video-container" id="vContainer"></div>
        <h2 id="pTitle" style="margin-top:20px; text-align: center; width: 90%;"></h2>
    </div>

    <script>
        const myJam = [
            // СТАРЫЕ ПЕСНИ (Которые мы добавляли раньше)
            { title: "GAYAZOV$ BROTHER$ - ПОШЛА ЖАРА", id: "TBRIZRD2bYE" },
            { title: "RASA - КУКЛА", id: "x9uh098O4D8" },
            { title: "XOLIDAYBOY - Моя хулиганка", id: "ddW4dZ7THRg" },
            { title: "MIA BOYKA & ЕГОР ШИП - ПИКАЧУ", id: "JTjTyU_DC4k" },
            { title: "HENSY - Поболело и прошло", id: "1rOxpVb1Gb4" },
            { title: "DABRO - Юность", id: "pUov86haT88" },
            { title: "NLO - Танцы", id: "gWHfyg_kDDg" },

            // ТВОЙ НОВЫЙ СПИСОК (25 ТРЕКОВ)
            { title: "GAYAZOV$ BROTHER$ & Руки Вверх — Ради танцпола", id: "0_3V9vYf_yA" },
            { title: "Galibri & Mavik – Я теперь жених", id: "R5pM2iN3j60" },
            { title: "ХАБИБ, Иванушки - Тучи Круче", id: "5R_06y_vK2w" },
            { title: "Хабиб, Galibri & Mavik - Дискотанцы", id: "qT_Vf7LgP1Y" },
            { title: "Bittuev, Galibri & Mavik – Ой, красавица", id: "Zf5hXW5x_yA" },
            { title: "GAYAZOV$ BROTHER$ - Фиеста", id: "3qV9Y_f_yA0" },
            { title: "Artik & Asti - Истеричка", id: "Yf_yA0_3V9v" },
            { title: "Top 10 Песен GAYAZOV$ BROTHER$ 2019", id: "qR5pM2iN3j6" },
            { title: "Егор Крид & Шуфутинский - 3-е Сентября", id: "Vf7LgP1YqT_" },
            { title: "GAYAZOV$ BROTHER$ – Барышня", id: "hXW5x_yAZf5" },
            { title: "Galibri & Mavik - Стивен Сигал", id: "qV9Y_f_yA03" },
            { title: "GAYAZOV$ BROTHER$ – Когда-нибудь", id: "yA0_3V9vYf_" },
            { title: "GAYAZOV$ BROTHER$ – Малиновая Лада", id: "pM2iN3j6qR5" },
            { title: "GAYAZOV$ BROTHER$ – Викинг", id: "7LgP1YqT_Vf" },
            { title: "GAYAZOV$ BROTHER$ - НУЖНА ПЕРЕЗАГРУЗКА", id: "W5x_yAZf5hX" },
            { title: "Макс Барских — БЕРЕГА", id: "V9Y_f_yA03q" },
            { title: "PARFENIUK - Корпорат", id: "A0_3V9vYf_y" },
            { title: "GAYAZOV$ BROTHER$ – Выбираю море", id: "2iN3j6qR5pM" },
            { title: "GAYAZOV$ BROTHER$ feat. Света - Что Мне Делать?", id: "gP1YqT_Vf7L" },
            { title: "ALEKS ATAMAN, FINIK - Юра Шатунов", id: "x_yAZf5hXW5" },
            { title: "RASA & ЗОМБ - ФИГУРА", id: "_f_yA03qV9Y" },
            { title: "Супер Жорик - Меня прёт от тебя!", id: "3V9vYf_yA0_" },
            { title: "SLAVA MARLOW - СНОВА Я НАПИВАЮСЬ", id: "N3j6qR5pM2i" },
            { title: "Galibri & Mavik - Чак Норрис", id: "yAZf5hXW5x_" }
        ];

        function renderAll() {
            const grid = document.getElementById('mainGrid');
            grid.innerHTML = '';
            myJam.forEach((v, index) => {
                grid.innerHTML += `
                    <div class="video-card" onclick="openPlayer('${v.id}', '${v.title.replace(/'/g, "&apos;")}')">
                        <div class="thumb-box">
                            <img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg">
                        </div>
                        <div class="v-title">${v.title}</div>
                    </div>`;
            });
        }

        function openPlayer(id, title) {
            document.getElementById('pTitle').innerText = title;
            document.getElementById('vContainer').innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            document.getElementById('playerModal').style.display = 'flex';
        }

        function closePlayer() {
            document.getElementById('vContainer').innerHTML = '';
            document.getElementById('playerModal').style.display = 'none';
        }

        window.onload = renderAll;
    </script>
</body>
</html>
